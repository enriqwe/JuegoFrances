<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apprends le Français ! 🇫🇷</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #f0f9ff;
            user-select: none;
        }
        .card {
            perspective: 1000px;
            cursor: pointer;
        }
        .card-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
            height: 100px;
        }
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            backface-visibility: hidden;
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .card-back {
            transform: rotateY(180deg);
            background-color: white;
        }
        img.emoji {
            display: inline-block;
            width: 1em;
            height: 1em;
            vertical-align: -0.1em;
        }
        .bounce-in {
            animation: bounceIn 0.5s cubic-bezier(0.36, 0, 0.66, -0.56) 0s 1 normal none;
        }
        @keyframes bounceIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- Header -->
    <header class="w-full max-w-4xl flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-blue-600">🇫🇷 Apprends le Français !</h1>
        <div id="score-badge" class="bg-yellow-400 px-4 py-2 rounded-full font-bold text-yellow-900 shadow-sm">
            Estrellas: <span id="star-count">0</span> ⭐
        </div>
    </header>

    <!-- Main Container -->
    <main id="game-container" class="w-full max-w-4xl bg-white rounded-3xl p-6 shadow-xl min-h-[500px] flex flex-col">
        <!-- Contenido dinámico -->
    </main>

    <!-- Modal de Feedback -->
    <div id="feedback-overlay" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl scale-0 transition-transform duration-300" id="feedback-content">
            <div id="feedback-emoji" class="text-6xl mb-4">🎉</div>
            <h2 id="feedback-title" class="text-2xl font-bold mb-2">¡Genial!</h2>
            <div id="feedback-text" class="text-gray-600 mb-6 whitespace-pre-line">Has acertado.</div>
            <button id="feedback-button" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-xl font-bold w-full">Continuar</button>
        </div>
    </div>

    <script>
        // --- VOCABULARIO ---
        const vocabulary = [
            { id: 1, fr: "Triangle", es: "Triángulo", emoji: "🔺", cat: "forme" },
            { id: 2, fr: "Cercle", es: "Círculo", emoji: "⚪", cat: "forme" },
            { id: 3, fr: "Carré", es: "Cuadrado", emoji: "🟦", cat: "forme" },
            { id: 4, fr: "Rectangle", es: "Rectángulo", emoji: "▭", cat: "forme" },
            { id: 20, fr: "Étoile", es: "Estrella", emoji: "⭐", cat: "forme" },
            { id: 21, fr: "Coeur", es: "Corazón", emoji: "❤️", cat: "forme" },
            { id: 22, fr: "Losange", es: "Rombo", emoji: "💠", cat: "forme" },
            { id: 23, fr: "Hexagone", es: "Hexágono", emoji: "⬡", cat: "forme" },
            { id: 24, fr: "Ovale", es: "Óvalo", emoji: "⬭", cat: "forme" },
            { id: 25, fr: "Pentagone", es: "Pentágono", emoji: "⬠", cat: "forme" },
            { id: 5, fr: "Cochon", es: "Cerdo", emoji: "🐷", cat: "animal" },
            { id: 6, fr: "Vache", es: "Vaca", emoji: "🐮", cat: "animal" },
            { id: 7, fr: "Mouton", es: "Oveja", emoji: "🐑", cat: "animal" },
            { id: 8, fr: "Taureau", es: "Toro", emoji: "🐂", cat: "animal" },
            { id: 9, fr: "Chèvre", es: "Cabra", emoji: "🐐", cat: "animal" },
            { id: 10, fr: "Cheval", es: "Caballo", emoji: "🐴", cat: "animal" },
            { id: 11, fr: "Lapin", es: "Conejo", emoji: "🐰", cat: "animal" },
            { id: 12, fr: "Chien", es: "Perro", emoji: "🐶", cat: "animal" },
            { id: 13, fr: "Chat", es: "Gato", emoji: "🐱", cat: "animal" },
            { id: 14, fr: "Coq", es: "Gallo", emoji: "🐓", cat: "animal" },

            { id: 18, fr: "Oie", es: "Ganso", emoji: "🪿", cat: "animal" },
            { id: 19, fr: "Poisson", es: "Pez", emoji: "🐟", cat: "animal" },
            { id: 26, fr: "Lion", es: "León", emoji: "🦁", cat: "animal" },

            { id: 33, fr: "Loup", es: "Lobo", emoji: "🐺", cat: "animal" },
            { id: 34, fr: "Hibou", es: "Búho", emoji: "🦉", cat: "animal" },
            { id: 35, fr: "Tortue", es: "Tortuga", emoji: "🐢", cat: "animal" },
            { id: 36, fr: "Souris", es: "Ratón", emoji: "🐭", cat: "animal" },
            { id: 37, fr: "Araignée", es: "Araña", emoji: "🕷️", cat: "animal" },
            { id: 38, fr: "Panda", es: "Panda", emoji: "🐼", cat: "animal" },
            { id: 39, fr: "Grenouille", es: "Rana", emoji: "🐸", cat: "animal" },
            { id: 40, fr: "Baleine", es: "Ballena", emoji: "🐳", cat: "animal" },
            { id: 41, fr: "Père", es: "Padre", emoji: "👨", cat: "famille" },
            { id: 42, fr: "Mère", es: "Madre", emoji: "👩", cat: "famille" },
            { id: 43, fr: "Frère", es: "Hermano", emoji: "👦", cat: "famille" },
            { id: 44, fr: "Sœur", es: "Hermana", emoji: "👧", cat: "famille" },
            { id: 45, fr: "Grand-père", es: "Abuelo", emoji: "👴", cat: "famille" },
            { id: 46, fr: "Grand-mère", es: "Abuela", emoji: "👵", cat: "famille" },
            { id: 47, fr: "Oncle", es: "Tío", emoji: "🧔", cat: "famille" },
            { id: 48, fr: "Tante", es: "Tía", emoji: "👩", cat: "famille" },
            { id: 49, fr: "Cousin", es: "Primo", emoji: "🧒", cat: "famille" },
            { id: 50, fr: "Cousine", es: "Prima", emoji: "👧", cat: "famille" },
            { id: 51, fr: "Fils", es: "Hijo", emoji: "👦", cat: "famille" },
            { id: 52, fr: "Fille", es: "Hija", emoji: "👧", cat: "famille" },
            { id: 53, fr: "Parents", es: "Padres", emoji: "👪", cat: "famille" },
            { id: 54, fr: "Bébé", es: "Bebé", emoji: "👶", cat: "famille" },
            { id: 55, fr: "Famille", es: "Familia", emoji: "👪", cat: "famille" },
            { id: 56, fr: "Voiture", es: "Coche", emoji: "🚗", cat: "transport" },
            { id: 57, fr: "Bus", es: "Autobús", emoji: "🚌", cat: "transport" },
            { id: 58, fr: "Train", es: "Tren", emoji: "🚆", cat: "transport" },
            { id: 59, fr: "Avion", es: "Avión", emoji: "✈️", cat: "transport" },
            { id: 60, fr: "Bateau", es: "Barco", emoji: "🚢", cat: "transport" },
            { id: 61, fr: "Vélo", es: "Bicicleta", emoji: "🚲", cat: "transport" },
            { id: 62, fr: "Moto", es: "Moto", emoji: "🏍️", cat: "transport" },
            { id: 63, fr: "Camion", es: "Camión", emoji: "🚚", cat: "transport" },
            { id: 64, fr: "Taxi", es: "Taxi", emoji: "🚕", cat: "transport" },
            { id: 65, fr: "Métro", es: "Metro", emoji: "🚇", cat: "transport" },
            { id: 66, fr: "Tramway", es: "Tranvía", emoji: "🚋", cat: "transport" },
            { id: 67, fr: "Hélicoptère", es: "Helicóptero", emoji: "🚁", cat: "transport" },
            { id: 68, fr: "Ambulance", es: "Ambulancia", emoji: "🚑", cat: "transport" },
            { id: 69, fr: "Fusée", es: "Cohete", emoji: "🚀", cat: "transport" },
            { id: 70, fr: "Trottinette", es: "Patinete", emoji: "🛴", cat: "transport" }
        ];

        let stars = 0;
        let selectedCategories = new Set(['forme', 'animal', 'famille', 'transport']);
        const categoryLabels = {
            forme: { name: 'Formas', emoji: '🔷' },
            animal: { name: 'Animales', emoji: '🐾' },
            famille: { name: 'Familia', emoji: '👪' },
            transport: { name: 'Transportes', emoji: '🚗' }
        };
        let gameSession = {
            currentRound: 0,
            maxRounds: 5,
            correctCount: 0,
            type: null
        };

        // --- UTILS ---
        function renderEmojiIcons(root = document.body) {
            if (!window.twemoji) return;
            twemoji.parse(root, {
                folder: 'svg',
                ext: '.svg',
                base: 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/'
            });
        }

        function getActiveVocabulary() {
            const active = vocabulary.filter(item => selectedCategories.has(item.cat));
            return active.length ? active : vocabulary;
        }

        function getCategoryOptionsHtml() {
            return Object.entries(categoryLabels).map(([cat, data]) => `
                <label class="flex items-center gap-3 bg-white border-2 ${selectedCategories.has(cat) ? 'border-blue-300' : 'border-gray-100'} rounded-2xl px-4 py-3 cursor-pointer hover:bg-blue-50 transition-all">
                    <input type="checkbox" class="w-5 h-5 accent-blue-500" ${selectedCategories.has(cat) ? 'checked' : ''} onchange="toggleCategory('${cat}', this.checked)">
                    <span class="text-2xl">${data.emoji}</span>
                    <span class="font-bold text-gray-700">${data.name}</span>
                </label>
            `).join('');
        }

        function toggleCategory(cat, checked) {
            if (checked) selectedCategories.add(cat);
            else selectedCategories.delete(cat);
            if (selectedCategories.size === 0) selectedCategories.add(cat);
            showMenu();
        }

        function requireWords(minCount, callback) {
            const count = getActiveVocabulary().length;
            if (count >= minCount) return true;
            showFeedback(false, "Faltan palabras", `Selecciona al menos una categoría con ${minCount} palabras o combina varias. Ahora hay ${count}.`, "📚", callback || showMenu);
            return false;
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'fr-FR';
            window.speechSynthesis.speak(utterance);
        }

        function shuffle(array) {
            return [...array].sort(() => Math.random() - 0.5);
        }

        function getTranslation(frWord) {
            const item = vocabulary.find(v => v.fr.toLowerCase() === frWord.toLowerCase());
            return item ? item.es : "desconocido";
        }

        function getFullMistakeMessage(correctFr, options) {
            const correctEs = getTranslation(correctFr);
            const others = options.filter(opt => (typeof opt === 'string' ? opt : opt.fr).toLowerCase() !== correctFr.toLowerCase());
            
            let msg = `Era "${correctFr}" (${correctEs}).\n\n`;
            msg += `Significado de las otras palabras:\n`;
            others.forEach(opt => {
                const fr = typeof opt === 'string' ? opt : opt.fr;
                msg += `• ${fr}: ${getTranslation(fr)}\n`;
            });
            return msg;
        }

        let feedbackTimeout = null;
        function showFeedback(success, title, text, emoji, callback) {
            if (feedbackTimeout) clearTimeout(feedbackTimeout);
            const overlay = document.getElementById('feedback-overlay');
            const content = document.getElementById('feedback-content');
            const btn = document.getElementById('feedback-button');
            
            document.getElementById('feedback-title').innerText = title;
            document.getElementById('feedback-text').innerText = text;
            document.getElementById('feedback-emoji').innerText = emoji || (success ? "🎉" : "🤔");
            
            btn.onclick = () => {
                closeFeedback(callback);
            };

            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            renderEmojiIcons(overlay);
            setTimeout(() => content.classList.add('scale-100'), 10);
        }

        function closeFeedback(callback) {
            const overlay = document.getElementById('feedback-overlay');
            const content = document.getElementById('feedback-content');
            content.classList.remove('scale-100');
            
            feedbackTimeout = setTimeout(() => {
                overlay.classList.add('hidden');
                overlay.classList.remove('flex');
                if (callback) callback();
            }, 300);
        }

        function renderHeader(gameTitle) {
            return `
                <div class="flex justify-between items-center mb-4">
                    <div>
                        <h3 class="font-bold text-xl text-blue-600">${gameTitle}</h3>
                        <p class="text-xs text-gray-400">Pregunta ${gameSession.currentRound + 1} de ${gameSession.maxRounds}</p>
                    </div>
                    <button onclick="showMenu()" class="bg-gray-100 px-3 py-1 rounded-lg text-sm hover:bg-gray-200">Salir</button>
                </div>
                <div class="w-full bg-gray-100 h-2 rounded-full mb-6 overflow-hidden">
                    <div class="bg-blue-400 h-full transition-all duration-500" style="width: ${(gameSession.currentRound / gameSession.maxRounds) * 100}%"></div>
                </div>
            `;
        }

        function checkSessionEnd(finalEmoji = "🏆") {
            gameSession.currentRound++;
            if (gameSession.currentRound >= gameSession.maxRounds) {
                const total = gameSession.correctCount;
                const bonus = total * 2;
                stars += bonus;
                document.getElementById('star-count').innerText = stars;
                
                setTimeout(() => {
                    showFeedback(
                        true, 
                        "¡Sesión terminada!", 
                        `Has acertado ${total} de ${gameSession.maxRounds}. Ganaste ${bonus} estrellas extras.`, 
                        finalEmoji, 
                        showMenu
                    );
                }, 100);
                return true;
            }
            return false;
        }

        // --- MENÚ ---
        function showMenu() {
            const container = document.getElementById('game-container');
            container.innerHTML = `
                <h2 class="text-2xl font-bold text-center mb-4 text-gray-700 font-fredoka">Elige palabras y juego</h2>
                <section class="mb-6 bg-blue-50 rounded-3xl p-4 border-2 border-blue-100">
                    <div class="flex items-center justify-between gap-3 mb-3">
                        <div>
                            <h3 class="font-bold text-blue-700">Palabras para practicar</h3>
                            <p class="text-sm text-blue-500">Puedes combinar varias categorías o jugar solo con una.</p>
                        </div>
                        <div class="text-sm font-bold text-blue-700 bg-white rounded-full px-3 py-1">
                            ${getActiveVocabulary().length} palabras
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                        ${getCategoryOptionsHtml()}
                    </div>
                </section>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button onclick="startMemory()" class="p-4 bg-orange-100 hover:bg-orange-200 rounded-2xl text-left flex items-center gap-4 transition-all hover:scale-[1.01]">
                        <span class="text-3xl">🧠</span>
                        <div>
                            <p class="font-bold text-orange-800">1. Memory Bilingüe</p>
                            <p class="text-sm text-orange-600">Encuentra parejas de palabras y emojis.</p>
                        </div>
                    </button>
                    <button onclick="initSession('missing')" class="p-4 bg-blue-100 hover:bg-blue-200 rounded-2xl text-left flex items-center gap-4 transition-all hover:scale-[1.01]">
                        <span class="text-3xl">🕵️</span>
                        <div>
                            <p class="font-bold text-blue-800">2. ¿Qué falta? (5 rondas)</p>
                            <p class="text-sm text-blue-600">Memoriza y descubre el que falta.</p>
                        </div>
                    </button>
                    <button onclick="initSession('fast')" class="p-4 bg-purple-100 hover:bg-purple-200 rounded-2xl text-left flex items-center gap-4 transition-all hover:scale-[1.01]">
                        <span class="text-3xl">⚡</span>
                        <div>
                            <p class="font-bold text-purple-800">3. Match Rápido (5 rondas)</p>
                            <p class="text-sm text-purple-600">¡Sé veloz antes de que acabe el tiempo!</p>
                        </div>
                    </button>
                    <button onclick="initSession('intruder')" class="p-4 bg-red-100 hover:bg-red-200 rounded-2xl text-left flex items-center gap-4 transition-all hover:scale-[1.01]">
                        <span class="text-3xl">🚫</span>
                        <div>
                            <p class="font-bold text-red-800">4. El Intruso (5 rondas)</p>
                            <p class="text-sm text-red-600">Solo palabras: encuentra la que no encaja.</p>
                        </div>
                    </button>
                    <button onclick="startRace()" class="p-4 bg-yellow-100 hover:bg-yellow-200 rounded-2xl text-left flex items-center gap-4 transition-all hover:scale-[1.01] md:col-span-2">
                        <span class="text-3xl">🏁</span>
                        <div>
                            <p class="font-bold text-yellow-800">5. Carrera de Vocabulario</p>
                            <p class="text-sm text-yellow-600">Llega a la meta con 5 aciertos seguidos.</p>
                        </div>
                    </button>
                </div>
            `;
        }

        function initSession(type) {
            gameSession = { currentRound: 0, maxRounds: 5, correctCount: 0, type: type };
            if (type === 'missing') renderWhatIsMissing();
            if (type === 'fast') renderFastMatch();
            if (type === 'intruder') renderIntruder();
        }

        // --- GAME 1: MEMORY ---
        function startMemory() {
            const container = document.getElementById('game-container');
            if (!requireWords(6)) return;
            const activeVocabulary = getActiveVocabulary();
            const items = shuffle([...activeVocabulary]).slice(0, 6);
            const cards = shuffle([...items.map(i => ({...i, type: 'emoji'})), ...items.map(i => ({...i, type: 'word'}))]);
            let html = `<div class="flex justify-between items-center mb-4"><h3 class="font-bold text-xl text-orange-600">Memory Bilingüe</h3><button onclick="showMenu()" class="text-sm bg-gray-100 px-2 py-1 rounded">Cerrar</button></div><div class="grid grid-cols-4 gap-3">`;
            cards.forEach((card, index) => {
                // Aumentado el tamaño de texto de [10px] a text-base y añadido px-1 para palabras largas
                html += `<div id="card-${index}" class="card h-24" onclick="handleMemoryClick(${index}, ${card.id}, '${card.type}', '${card.fr}')"><div class="card-inner w-full h-full"><div class="card-front bg-orange-400 text-white text-2xl font-bold">?</div><div class="card-back text-center p-1 border-2 border-orange-400 font-bold text-base leading-tight flex items-center justify-center overflow-hidden break-words px-1">${card.type === 'emoji' ? `<span class="text-3xl">${card.emoji}</span>` : card.fr}</div></div></div>`;
            });
            container.innerHTML = html + `</div>`;

            let flipped = [], solved = 0, checkingPair = false;
            window.handleMemoryClick = (idx, id, type, fr) => {
                const el = document.getElementById(`card-${idx}`);
                if (!el || checkingPair || el.classList.contains('flipped') || el.classList.contains('matched')) return;
                el.classList.add('flipped');
                if (type === 'word') speak(fr);
                flipped.push({ idx, id, type, el });

                if (flipped.length === 2) {
                    const [first, second] = flipped;
                    const isPair = first.id === second.id && first.type !== second.type;
                    checkingPair = true;

                    if (isPair) {
                        first.el.classList.add('matched');
                        second.el.classList.add('matched');
                        solved++;
                        flipped = [];
                        checkingPair = false;
                        if (solved === items.length) {
                            stars += 10; document.getElementById('star-count').innerText = stars;
                            showFeedback(true, "¡Bravo!", "Has completado el tablero.", "🥇", showMenu);
                        }
                    } else {
                        setTimeout(() => {
                            first.el.classList.remove('flipped');
                            second.el.classList.remove('flipped');
                            flipped = [];
                            checkingPair = false;
                        }, 900);
                    }
                }
            };
        }

        // --- GAME 2: ¿QUÉ FALTA? ---
        function renderWhatIsMissing() {
            const container = document.getElementById('game-container');
            if (!requireWords(6)) return;
            const activeVocabulary = getActiveVocabulary();
            const pool = shuffle([...activeVocabulary]).slice(0, 4);
            const missingIdx = Math.floor(Math.random() * 4);
            const missingItem = pool[missingIdx];

            container.innerHTML = `
                ${renderHeader("¿Qué falta?")}
                <p class="text-center text-gray-500 mb-6">Memoriza estos elementos...</p>
                <div class="flex justify-around bg-blue-50 p-6 rounded-2xl mb-8">
                    ${pool.map(item => `<div class="text-center"><div class="text-5xl mb-2 bounce-in">${item.emoji}</div><div class="font-bold text-blue-600 text-xs">${item.fr}</div></div>`).join('')}
                </div>
            `;

            setTimeout(() => {
                const choices = shuffle([missingItem, ...shuffle(activeVocabulary.filter(v => !pool.includes(v))).slice(0, 2)]);
                container.innerHTML = `
                    ${renderHeader("¿Qué falta?")}
                    <p class="text-center text-lg font-bold mb-6">¿Cuál ha desaparecido?</p>
                    <div class="flex justify-around bg-gray-100 p-6 rounded-2xl mb-8">
                        ${pool.map((item, i) => i === missingIdx ? `<div class="w-16 h-16 bg-white border-2 border-dashed border-gray-400 rounded-full flex items-center justify-center text-3xl">?</div>` : `<div class="text-5xl opacity-50">${item.emoji}</div>`).join('')}
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        ${choices.map(choice => `<button onclick="handleMissing('${choice.fr}', '${missingItem.fr}', ${JSON.stringify(choices.map(c => c.fr)).replace(/"/g, "'")})" class="bg-white border-2 border-blue-200 p-4 rounded-xl hover:bg-blue-50 font-bold shadow-sm transition-all">${choice.fr}</button>`).join('')}
                    </div>
                `;
            }, 3000);

            window.handleMissing = (choice, correct, allOptions) => {
                const isCorrect = choice === correct;
                if (isCorrect) { gameSession.correctCount++; speak(correct); }
                
                const msg = isCorrect ? `Era ${correct} (${getTranslation(correct)})` : getFullMistakeMessage(correct, allOptions);
                
                showFeedback(
                    isCorrect, 
                    isCorrect ? "¡Correcto!" : "¡Oh no!", 
                    msg, 
                    null, 
                    () => { if (!checkSessionEnd("🕵️")) renderWhatIsMissing(); }
                );
            };
        }

        // --- GAME 3: MATCH RÁPIDO ---
        function renderFastMatch() {
            const container = document.getElementById('game-container');
            if (!requireWords(3)) return;
            const activeVocabulary = getActiveVocabulary();
            const target = activeVocabulary[Math.floor(Math.random() * activeVocabulary.length)];
            const options = shuffle([target, ...shuffle(activeVocabulary.filter(v => v !== target)).slice(0, 2)]);
            
            container.innerHTML = `
                ${renderHeader("Match Rápido")}
                <div class="flex-1 flex flex-col items-center justify-center">
                    <div class="text-8xl mb-8 bounce-in">${target.emoji}</div>
                    <div class="w-full bg-gray-200 h-4 rounded-full mb-8 overflow-hidden">
                        <div id="timer-bar" class="bg-red-500 h-full w-full transition-all duration-[3000ms] ease-linear"></div>
                    </div>
                    <div class="grid grid-cols-1 w-full gap-4">
                        ${options.map(opt => `<button onclick="handleFastMatch('${opt.fr}', '${target.fr}', ${JSON.stringify(options.map(o => o.fr)).replace(/"/g, "'")})" class="bg-purple-100 hover:bg-purple-200 p-4 rounded-2xl text-xl font-bold text-purple-800 transition-all">${opt.fr}</button>`).join('')}
                    </div>
                </div>
            `;

            setTimeout(() => {
                const bar = document.getElementById('timer-bar');
                if (bar) bar.style.width = '0%';
            }, 50);

            const timerId = setTimeout(() => handleFastMatch(null, target.fr, options.map(o => o.fr)), 3050);

            window.handleFastMatch = (choice, correct, allOptions) => {
                clearTimeout(timerId);
                const isCorrect = (choice === correct);
                if (isCorrect) { gameSession.correctCount++; speak(correct); }
                
                const msg = isCorrect ? `¡Perfecto! ${correct}` : getFullMistakeMessage(correct, allOptions);
                
                showFeedback(
                    isCorrect,
                    isCorrect ? "¡Rápido y bien!" : (choice === null ? "¡Tiempo!" : "Casi..."),
                    msg,
                    null,
                    () => { if (!checkSessionEnd("⚡")) renderFastMatch(); }
                );
            };
        }

        // --- GAME 4: EL INTRUSO ---
        function renderIntruder() {
            const container = document.getElementById('game-container');
            const availableCats = [...selectedCategories].filter(cat => vocabulary.filter(v => v.cat === cat).length >= 3);
            const otherCats = [...selectedCategories].filter(cat => vocabulary.some(v => v.cat === cat));
            if (availableCats.length < 1 || otherCats.length < 2) {
                showFeedback(false, "Combina categorías", "El Intruso necesita al menos dos categorías seleccionadas para poder esconder una palabra que no encaja.", "🚫", showMenu);
                return;
            }
            const baseCat = shuffle(availableCats)[0];
            const intruderCat = shuffle(otherCats.filter(cat => cat !== baseCat))[0];
            const group = shuffle(vocabulary.filter(v => v.cat === baseCat)).slice(0, 3);
            const intruderPool = vocabulary.filter(v => v.cat === intruderCat);
            const intruder = intruderPool[Math.floor(Math.random() * intruderPool.length)];
            const allItems = shuffle([...group, intruder]);

            container.innerHTML = `
                ${renderHeader("El Intruso")}
                <p class="text-center text-gray-600 mb-8 font-semibold">¿Qué palabra NO pertenece al grupo?</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    ${allItems.map(item => `<button onclick="handleIntruder('${item.fr}', '${intruder.fr}', ${JSON.stringify(allItems.map(i => i.fr)).replace(/"/g, "'")})" class="bg-white border-4 border-gray-100 p-8 rounded-3xl hover:border-red-300 hover:bg-red-50 transition-all text-2xl font-bold text-gray-700">${item.fr}</button>`).join('')}
                </div>
            `;

            window.handleIntruder = (choice, correct, allOptions) => {
                const isCorrect = choice === correct;
                if (isCorrect) { gameSession.correctCount++; speak(correct); }
                
                const msg = isCorrect ? `"${correct}" era el intruso.` : getFullMistakeMessage(correct, allOptions);
                
                showFeedback(
                    isCorrect,
                    isCorrect ? "¡Lo encontraste!" : "No...",
                    msg,
                    null,
                    () => { if (!checkSessionEnd("🚫")) renderIntruder(); }
                );
            };
        }

        // --- GAME 5: CARRERA ---
        function startRace() {
            gameSession = { currentRound: 0, maxRounds: 5, correctCount: 0, type: 'race' };
            if (!requireWords(5)) return;
            const activeVocabulary = getActiveVocabulary();
            const racePool = shuffle([...activeVocabulary]).slice(0, 5);
            
            const renderRaceStep = () => {
                const container = document.getElementById('game-container');
                const target = racePool[gameSession.currentRound];
                const options = shuffle([target, ...shuffle(activeVocabulary.filter(v => v !== target)).slice(0, 2)]);

                container.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-xl text-yellow-600">Carrera de Vocabulario</h3>
                        <button onclick="showMenu()" class="text-sm bg-gray-100 px-2 py-1 rounded">Salir</button>
                    </div>
                    <div class="flex justify-between mb-8 bg-gray-50 p-4 rounded-xl items-center overflow-x-auto no-scrollbar">
                        ${racePool.map((item, i) => `
                            <div class="w-10 h-10 min-w-[40px] rounded-full flex items-center justify-center text-xl transition-all ${i < gameSession.currentRound ? 'bg-green-500' : (i === gameSession.currentRound ? 'bg-yellow-500 animate-bounce scale-110 shadow-md' : 'bg-gray-200')}">
                                ${i < gameSession.currentRound ? '✅' : item.emoji}
                            </div>
                        `).join('<div class="flex-1 border-t-2 border-dashed border-gray-300 mx-1"></div>')}
                        <div class="flex-1 border-t-2 border-dashed border-gray-300 mx-1"></div>
                        <div class="w-10 h-10 min-w-[40px] bg-blue-600 rounded-full flex items-center justify-center text-xl">🏁</div>
                    </div>
                    <div class="text-center mb-6 bg-yellow-50 p-6 rounded-2xl border-2 border-yellow-200">
                        <p class="text-gray-500 mb-1 text-xs uppercase font-bold tracking-widest">Traduce:</p>
                        <h4 class="text-4xl font-bold text-gray-800">${target.es}</h4>
                    </div>
                    <div class="grid grid-cols-1 gap-3">
                        ${options.map(opt => `<button onclick="handleRaceStep('${opt.fr}', '${target.fr}', ${JSON.stringify(options.map(o => o.fr)).replace(/"/g, "'")})" class="bg-white border-2 border-yellow-300 hover:bg-yellow-100 p-4 rounded-xl font-bold text-lg transition-all">${opt.fr}</button>`).join('')}
                    </div>
                `;
            };

            window.handleRaceStep = (choice, correct, allOptions) => {
                if (choice === correct) {
                    gameSession.correctCount++;
                    speak(correct);
                    gameSession.currentRound++;
                    if (gameSession.currentRound >= gameSession.maxRounds) {
                        stars += 15;
                        document.getElementById('star-count').innerText = stars;
                        showFeedback(true, "¡META!", "¡Has ganado la carrera impecablemente!", "🏆", showMenu);
                    } else {
                        renderRaceStep();
                    }
                } else {
                    const msg = getFullMistakeMessage(correct, allOptions);
                    showFeedback(false, "¡Tropezaste!", msg + "\nEmpieza de nuevo la carrera.", "🤕", showMenu);
                }
            };
            renderRaceStep();
        }

        const iconObserver = new MutationObserver(() => renderEmojiIcons());

        window.onload = () => {
            showMenu();
            iconObserver.observe(document.body, { childList: true, subtree: true });
            renderEmojiIcons();
            window.speechSynthesis.getVoices();
        };

    </script>
</body>
